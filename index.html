<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Murmur</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@1,400;1,600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;position:sticky;top:0;z-index:10;background:linear-gradient(to bottom,#0a0a0a 70%,transparent);}
.brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fff;}
.nav{display:flex;align-items:center;gap:18px;}
.nav span{font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;}
.nav span:hover{color:#fff;}
.admin-link{font-size:13px;color:rgba(255,255,255,0.4);cursor:pointer;border:0.5px solid rgba(255,255,255,0.15);padding:5px 12px;border-radius:8px;user-select:none;}
.admin-link:hover{color:#fff;border-color:rgba(255,255,255,0.35);}
.search-wrap{padding:0 20px 16px;}
.search-box{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 16px;}
.search-box input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:#fff;font-family:'DM Sans',sans-serif;}
.search-box input::placeholder{color:rgba(255,255,255,0.25);}
.tags{display:flex;gap:8px;padding:0 20px 20px;overflow-x:auto;scrollbar-width:none;}
.tags::-webkit-scrollbar{display:none;}
.tag{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);cursor:pointer;white-space:nowrap;}
.tag.active{background:#fff;color:#0a0a0a;border-color:#fff;}
.stories-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 20px 24px;}
@media(max-width:700px){.stories-grid{grid-template-columns:repeat(2,1fr);}}
.tile{border-radius:14px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:2/3;}
.tile-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;transition:transform 0.4s ease;}
.tile:hover .tile-img{transform:scale(1.04);}
.tile-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.3) 50%,rgba(0,0,0,0.05) 100%);}
.tile-content{position:absolute;bottom:0;left:0;right:0;padding:14px 12px;}
.tile-genre{font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:5px;}
.tile-title{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;font-weight:600;line-height:1.35;color:#fff;margin-bottom:8px;}
.tile-meta{display:flex;align-items:center;gap:8px;}
.tile-author{font-size:10px;color:rgba(255,255,255,0.4);}
.tile-likes{font-size:10px;color:rgba(255,255,255,0.35);margin-left:auto;}
#chat-page{display:none;flex-direction:column;height:100vh;background:#0a0a0a;}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:0.5px solid rgba(255,255,255,0.08);}
.chat-header-left{display:flex;align-items:center;gap:10px;}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;}
.chat-name{font-size:14px;font-weight:500;color:#fff;}
.chat-sub{font-size:11px;color:rgba(255,255,255,0.35);}
.close-chat{font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;border:0.5px solid rgba(255,255,255,0.15);padding:5px 14px;border-radius:8px;}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
.msg-group{display:flex;flex-direction:column;}
.msg-group.right{align-items:flex-end;}
.msg-group.left{align-items:flex-start;}
.msg{max-width:75%;padding:9px 14px;font-size:13px;line-height:1.5;border-radius:16px;}
.msg.them{background:rgba(255,255,255,0.08);color:#fff;border-bottom-left-radius:4px;}
.msg.me{background:#fff;color:#0a0a0a;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:rgba(255,255,255,0.2);margin-top:3px;}
.chat-input-bar{padding:12px 20px;border-top:0.5px solid rgba(255,255,255,0.08);display:flex;gap:10px;align-items:center;}
.chat-input{flex:1;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);border-radius:20px;padding:9px 16px;font-size:13px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;}
.chat-input::placeholder{color:rgba(255,255,255,0.25);}
.send-btn{width:36px;height:36px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#admin-page{display:none;flex-direction:column;height:100vh;background:#0a0a0a;}
.admin-header{padding:16px 20px;border-bottom:0.5px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;}
.admin-sub{font-size:11px;color:rgba(255,255,255,0.35);}
.admin-back{font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;border:0.5px solid rgba(255,255,255,0.15);padding:5px 14px;border-radius:8px;}
.admin-body{display:flex;flex:1;overflow:hidden;}
.convo-list{width:240px;border-right:0.5px solid rgba(255,255,255,0.08);overflow-y:auto;flex-shrink:0;}
@media(max-width:600px){.convo-list{width:110px;}}
.convo-item{padding:14px 16px;border-bottom:0.5px solid rgba(255,255,255,0.06);cursor:pointer;}
.convo-item:hover{background:rgba(255,255,255,0.04);}
.convo-item.active{background:rgba(255,255,255,0.07);}
.convo-name{font-size:13px;font-weight:500;color:#fff;margin-bottom:2px;}
.convo-preview{font-size:11px;color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.convo-badge{display:inline-block;background:#22c55e;color:#000;font-size:9px;font-weight:600;padding:2px 6px;border-radius:8px;margin-left:6px;}
.admin-chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.admin-chat-header{padding:12px 16px;border-bottom:0.5px solid rgba(255,255,255,0.08);font-size:13px;color:rgba(255,255,255,0.6);}
.admin-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.admin-msg{max-width:75%;padding:8px 12px;font-size:13px;line-height:1.5;border-radius:12px;}
.admin-msg-meta{font-size:10px;color:rgba(255,255,255,0.25);margin-top:2px;}
.admin-reply-bar{padding:12px 16px;border-top:0.5px solid rgba(255,255,255,0.08);display:flex;gap:10px;}
.admin-reply-input{flex:1;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);border-radius:20px;padding:9px 16px;font-size:13px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;}
.admin-reply-input::placeholder{color:rgba(255,255,255,0.25);}
.admin-send-btn{width:36px;height:36px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#admin-login{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;padding:20px;}
.admin-login-box{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12);border-radius:16px;padding:32px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:14px;}
.admin-login-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;text-align:center;}
.admin-login-input{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 16px;font-size:14px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;width:100%;}
.admin-login-btn{background:#fff;color:#0a0a0a;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.admin-login-err{font-size:12px;color:#ef4444;text-align:center;display:none;}
.new-msg-toast{position:fixed;top:16px;right:16px;background:#22c55e;color:#000;font-size:13px;font-weight:500;padding:10px 18px;border-radius:10px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.new-msg-toast.show{opacity:1;}
</style>
</head>
<body>

<div id="stories-page">
  <div class="topbar">
    <div class="brand">Murmur</div>
    <div class="nav">
      <span>Discover</span>
      <span>Following</span>
      <span class="admin-link" id="admin-link">☰</span>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search stories, authors, tags…" autocomplete="off" spellcheck="false" />
    </div>
  </div>
  <div class="tags">
    <div class="tag active">All</div>
    <div class="tag">Mystery</div>
    <div class="tag">Romance</div>
    <div class="tag">Sci-Fi</div>
    <div class="tag">Horror</div>
    <div class="tag">Literary</div>
    <div class="tag">Thriller</div>
    <div class="tag">Fantasy</div>
  </div>
  <div class="stories-grid" id="stories-grid"></div>
</div>

<div id="chat-page">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="online-dot"></div>
      <div>
        <div class="chat-name">Private Channel</div>
        <div class="chat-sub">Session only · disappears on close</div>
      </div>
    </div>
    <div class="close-chat" id="close-btn">Close</div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-bar">
    <input class="chat-input" id="chat-input" type="text" placeholder="Type a message…" />
    <button class="send-btn" id="send-btn">➤</button>
  </div>
</div>

<div id="admin-login">
  <div class="admin-login-box">
    <div class="admin-login-title">Admin Access</div>
    <input class="admin-login-input" type="password" id="admin-pass" placeholder="Enter admin password" />
    <button class="admin-login-btn" id="admin-login-btn">Enter</button>
    <div class="admin-login-err" id="admin-err">Wrong password</div>
  </div>
</div>

<div id="admin-page">
  <div class="admin-header">
    <div>
      <div class="admin-title">Murmur Admin</div>
      <div class="admin-sub">All conversations · real-time</div>
    </div>
    <div class="admin-back" id="admin-back">← Exit</div>
  </div>
  <div class="admin-body">
    <div class="convo-list" id="convo-list"></div>
    <div class="admin-chat">
      <div class="admin-chat-header" id="admin-chat-header">Select a conversation</div>
      <div class="admin-messages" id="admin-messages"></div>
      <div class="admin-reply-bar">
        <input class="admin-reply-input" id="admin-reply-input" type="text" placeholder="Reply…" />
        <button class="admin-send-btn" id="admin-send-btn">➤</button>
      </div>
    </div>
  </div>
</div>

<div class="new-msg-toast" id="toast"></div>

<script>
const SUPABASE_URL='https://zglmlqzcjrkkdkjxfgwh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnbG1scXpjanJra2RranhmZ3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzgwODQsImV4cCI6MjA5NDg1NDA4NH0.AMJk4lyJdedpXu4kqog8w9Lhjrv7ZNn5pkyxWP7NckE';
const ADMIN_PASSWORD='Mashetty@newapp.112';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const stories=[
  {genre:'Mystery',title:'She Left a Note in Every Mirror',author:'Anya Mehta',likes:'1.8k',bg:'#1a0a2e',emoji:'🌙'},
  {genre:'Sci-Fi',title:'The Last Satellite Remembers Your Face',author:'Darius Cole',likes:'3.1k',bg:'#0a1a2e',emoji:'🛸'},
  {genre:'Literary',title:'My Grandmother Kept Silence Like a Second Language',author:'Priya Nair',likes:'970',bg:'#0a1a0a',emoji:'🌿'},
  {genre:'Horror',title:'Room 4B Has Always Been Empty',author:'Marcus Webb',likes:'2.2k',bg:'#1a0a0a',emoji:'🕯️'},
  {genre:'Romance',title:'Every Letter I Wrote You Was the Wrong One',author:'Sofia Lenz',likes:'4.4k',bg:'#1a0a1a',emoji:'💌'},
  {genre:'Thriller',title:'The Man Who Remembered Tomorrow',author:'Jin Park',likes:'2.9k',bg:'#1a1a0a',emoji:'⏳'},
  {genre:'Fantasy',title:"Gods Don't Bleed, But They Do Forget",author:'Amara Diallo',likes:'5.1k',bg:'#0a1a1a',emoji:'⚡'},
  {genre:'Mystery',title:'The Detective Had Only One Eye Left',author:'Leo Vance',likes:'1.3k',bg:'#2a0a0a',emoji:'🔍'},
  {genre:'Sci-Fi',title:'We Cloned the Ocean and It Remembered Us',author:'Yuna Kim',likes:'2.7k',bg:'#0a1a2e',emoji:'🌊'},
  {genre:'Horror',title:'My Shadow Started Coming Home Late',author:'Ren Adeyemi',likes:'3.8k',bg:'#1a0a0a',emoji:'👤'},
  {genre:'Literary',title:'A Love Story Told Only in Grocery Lists',author:'Mia Chen',likes:'1.1k',bg:'#0a1a0a',emoji:'📝'},
  {genre:'Romance',title:'We Met in the Wrong Century',author:'Caleb Rush',likes:'6.2k',bg:'#1a0a2e',emoji:'🕰️'},
];
const grid=document.getElementById('stories-grid');
stories.forEach(s=>{
  const tile=document.createElement('div');
  tile.className='tile';
  tile.innerHTML=`<div class="tile-img" style="background:linear-gradient(135deg,${s.bg},#0a0a0a)">${s.emoji}</div><div class="tile-gradient"></div><div class="tile-content"><div class="tile-genre">${s.genre}</div><div class="tile-title">${s.title}</div><div class="tile-meta"><span class="tile-author">${s.author}</span><span class="tile-likes">♥ ${s.likes}</span></div></div>`;
  grid.appendChild(tile);
});

const pages={stories:document.getElementById('stories-page'),chat:document.getElementById('chat-page'),adminLogin:document.getElementById('admin-login'),admin:document.getElementById('admin-page')};
function showPage(name){Object.entries(pages).forEach(([k,v])=>v.style.display=k===name?(k==='chat'||k==='admin'||k==='adminLogin'?'flex':'block'):'none');}
showPage('stories');

let currentCode=null,chatSub=null;
const searchInput=document.getElementById('search-input');
searchInput.addEventListener('input',async()=>{
  const val=searchInput.value.trim().toLowerCase();
  if(!val)return;
  const{data}=await db.from('codes').select('*').eq('code',val).single();
  if(data){currentCode=data;searchInput.value='';openChat();}
});

async function openChat(){
  showPage('chat');
  document.getElementById('messages').innerHTML='';
  addChatMsg('them',"You're in. This chat vanishes when you close.");
  if(chatSub)chatSub.unsubscribe();
  chatSub=db.channel('chat-'+currentCode.code)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`code=eq.${currentCode.code}`},payload=>{
      if(payload.new.sender==='admin')addChatMsg('them',payload.new.content);
    }).subscribe();
  await db.from('messages').insert({code:currentCode.code,sender:'system',content:`${currentCode.name} is now online`});
}

function closeChat(){
  if(chatSub){chatSub.unsubscribe();chatSub=null;}
  currentCode=null;
  showPage('stories');
  searchInput.value='';
}

function addChatMsg(side,text){
  const msgs=document.getElementById('messages');
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const g=document.createElement('div');
  g.className=`msg-group ${side==='me'?'right':'left'}`;
  g.innerHTML=`<div class="msg ${side}">${text}</div><div class="msg-time">${t}</div>`;
  msgs.appendChild(g);
  msgs.scrollTop=msgs.scrollHeight;
}

document.getElementById('close-btn').addEventListener('click',closeChat);
document.addEventListener('visibilitychange',()=>{if(document.hidden&&currentCode)closeChat();});

async function sendUserMessage(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text||!currentCode)return;
  input.value='';
  addChatMsg('me',text);
  await db.from('messages').insert({code:currentCode.code,sender:currentCode.name,content:text});
}
document.getElementById('send-btn').addEventListener('click',sendUserMessage);
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendUserMessage();});

document.getElementById('admin-link').addEventListener('click',()=>showPage('adminLogin'));
document.getElementById('admin-back').addEventListener('click',()=>showPage('stories'));

document.getElementById('admin-login-btn').addEventListener('click',()=>{
  const pass=document.getElementById('admin-pass').value;
  if(pass===ADMIN_PASSWORD){document.getElementById('admin-pass').value='';loadAdmin();showPage('admin');}
  else{document.getElementById('admin-err').style.display='block';}
});
document.getElementById('admin-pass').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('admin-login-btn').click();});

let selectedCode=null,adminSub=null,convos={};

async function loadAdmin(){
  const{data:codes}=await db.from('codes').select('*');
  const{data:messages}=await db.from('messages').select('*').order('created_at',{ascending:true});
  convos={};
  codes.forEach(c=>convos[c.code]={name:c.name,messages:[],unread:0});
  messages.forEach(m=>{if(convos[m.code])convos[m.code].messages.push(m);});
  renderConvoList();
  if(adminSub)adminSub.unsubscribe();
  adminSub=db.channel('admin-all')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
      const m=payload.new;
      if(!convos[m.code])return;
      convos[m.code].messages.push(m);
      if(m.sender!=='admin'){
        convos[m.code].unread=(convos[m.code].unread||0)+1;
        showToast(`New message from ${convos[m.code].name}`);
        if(selectedCode===m.code)renderAdminMessages();
      }
      renderConvoList();
    }).subscribe();
}

function renderConvoList(){
  const list=document.getElementById('convo-list');
  list.innerHTML='';
  Object.entries(convos).forEach(([code,c])=>{
    const last=c.messages.filter(m=>m.sender!=='system').slice(-1)[0];
    const item=document.createElement('div');
    item.className=`convo-item${selectedCode===code?' active':''}`;
    item.innerHTML=`<div class="convo-name">${c.name}${c.unread?`<span class="convo-badge">${c.unread}</span>`:''}</div><div class="convo-preview">${last?last.content:'No messages yet'}</div>`;
    item.addEventListener('click',()=>selectConvo(code));
    list.appendChild(item);
  });
}

function selectConvo(code){
  selectedCode=code;
  if(convos[code])convos[code].unread=0;
  renderConvoList();
  renderAdminMessages();
  document.getElementById('admin-chat-header').textContent=convos[code]?.name||code;
}

function renderAdminMessages(){
  const el=document.getElementById('admin-messages');
  el.innerHTML='';
  if(!selectedCode||!convos[selectedCode])return;
  convos[selectedCode].messages.filter(m=>m.sender!=='system').forEach(m=>{
    const now=new Date(m.created_at);
    const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    const div=document.createElement('div');
    div.style.cssText=`display:flex;flex-direction:column;align-items:${m.sender==='admin'?'flex-end':'flex-start'}`;
    div.innerHTML=`<div class="admin-msg" style="background:${m.sender==='admin'?'#fff':'rgba(255,255,255,0.08)'};color:${m.sender==='admin'?'#0a0a0a':'#fff'}">${m.content}</div><div class="admin-msg-meta">${m.sender} · ${t}</div>`;
    el.appendChild(div);
  });
  el.scrollTop=el.scrollHeight;
}

async function sendAdminReply(){
  const input=document.getElementById('admin-reply-input');
  const text=input.value.trim();
  if(!text||!selectedCode)return;
  input.value='';
  await db.from('messages').insert({code:selectedCode,sender:'admin',content:text});
  convos[selectedCode].messages.push({code:selectedCode,sender:'admin',content:text,created_at:new Date().toISOString()});
  renderAdminMessages();
}
document.getElementById('admin-send-btn').addEventListener('click',sendAdminReply);
document.getElementById('admin-reply-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendAdminReply();});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

document.querySelectorAll('.tag').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tag').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
  });
});
</script>
</body>
</html>
